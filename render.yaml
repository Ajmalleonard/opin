services:
  - type: web
    name: opin
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPIN_STATE_DIR
        value: /data
      - key: OPIN_WORKSPACE_DIR
        value: /data/workspace
      - key: OPIN_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: opin-data
      mountPath: /data
      sizeGB: 1
